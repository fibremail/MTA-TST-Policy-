<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f8f8f8;
    color: #333;
  }

  .container {
    max-width: 600px;
    margin: 120px auto;
    padding: 20px;
    text-align: center;
  }

  h1 {
    font-size: 52px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  p {
    font-size: 18px;
    color: #666;
    margin-bottom: 30px;
  }

  .divider {
    border-top: 1px solid #e0e0e0;
    margin: 30px 0;
  }

  .footer {
    font-size: 12px;
    color: #999;
  }
</style>

</head>

<body>
  <div class="container">
    <h1>404 Not Found</h1>
    <p>The requested URL does not exist on this endpoint.</p>

    <div class="divider"></div>

    <div class="footer">
      MTA-STS Policy Hosting Endpoint
    </div>
  </div>
</body>
</html>
